name: CI — Testes Automatizados

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Testes do Backend (FastAPI + Pytest)
  # ─────────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: 🐍 Backend Tests (Pytest)
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "sqlite:///:memory:"
      SECRET_KEY: "ci-test-secret-key-not-used-in-production"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências do sistema (ODBC stub)
        run: |
          sudo apt-get update -qq
          # pyodbc requer unixODBC para compilar — instalamos apenas os headers
          sudo apt-get install -y unixodbc-dev

      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Executar testes com pytest
        run: |
          python -m pytest tests/ \
            --tb=short \
            --no-header \
            -v \
            --junit-xml=test-results/backend.xml

      - name: Publicar resultados dos testes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: test-results/backend.xml

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Build + Lint do Frontend (Vite + ESLint)
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-build:
    name: ⚛️ Frontend Build & Lint (Vite)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Verificar lint (ESLint)
        run: npm run lint
        continue-on-error: true  # Lint não bloqueia o build, apenas reporta

      - name: Executar testes unitários (Vitest)
        run: npm run test

      - name: Build de produção (verifica erros de compilação)
        run: npm run build

      - name: Publicar build como artefato
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Resumo de Status (roda após os dois Jobs acima)
  # ─────────────────────────────────────────────────────────────────────────────
  ci-summary:
    name: ✅ CI Status
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: always()

    steps:
      - name: Verificar resultado dos jobs
        run: |
          echo "Backend Tests: ${{ needs.backend-tests.result }}"
          echo "Frontend Build: ${{ needs.frontend-build.result }}"

          if [[ "${{ needs.backend-tests.result }}" == "failure" ]]; then
            echo "❌ FALHA: Backend tests falharam!"
            exit 1
          fi

          if [[ "${{ needs.frontend-build.result }}" == "failure" ]]; then
            echo "❌ FALHA: Frontend build falhou!"
            exit 1
          fi

          echo "✅ Todos os checks passaram com sucesso!"
